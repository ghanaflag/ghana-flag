<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #ffffff;
    }

    .flag {
      width: 300px;
      height: 200px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
      position: relative;
    }

    .stripe {
      flex: 1;
    }

    .red {
      background: #ce1126;
    }

    .yellow {
      background: #fcd116;
      position: relative;
    }

    .green {
      background: #006b3f;
    }

    .star {
      position: absolute;
      top: 50%;
      left: 50%;
      font-size: 55px;
      color: black;
      transform: translate(-50%, -50%);
      line-height: 1;
      cursor: pointer;
    }

    .pulse {
      animation: pulse 1.5s infinite ease-in-out;
    }

    @keyframes pulse {
      0%   { transform: translate(-50%, -50%) scale(1); }
      50%  { transform: translate(-50%, -50%) scale(1.25); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }
  </style>
</head>

<body>
  <div class="flag">
    <div class="stripe red"></div>

    <div class="stripe yellow">
      <div class="star pulse" id="star">★</div>
    </div>

    <div class="stripe green"></div>
  </div>

  <!-- Гимн -->
  <audio id="anthem" src="National_Anthem_of_Ghana.ogg"></audio>

  <script>
    const star = document.getElementById("star");
    const anthem = document.getElementById("anthem");

    let isPulsing = true;
    let isPlaying = false;

    star.addEventListener("click", () => {
      // пульсация вкл/выкл
      isPulsing = !isPulsing;

      if (isPulsing) {
        star.classList.add("pulse");
      } else {
        star.classList.remove("pulse");
      }

      // музыка вкл/выкл
      if (!isPlaying) {
        anthem.play();
        isPlaying = true;
      } else {
        anthem.pause();
        anthem.currentTime = 0;
        isPlaying = false;
      }
    });
  </script>
</body>
</html>
